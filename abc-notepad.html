<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABC Notepad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #e8c84a;
    --accent2: #4ae8b4;
    --text: #f0ede6;
    --text-dim: #888;
    --btn-bg: #222;
    --btn-bg-lg: #2a2a1a;
    --btn-border: #3a3a3a;
    --btn-border-lg: #5a5020;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 7px;
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    padding: 2px 0 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-settings {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: 0.75rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    touch-action: manipulation;
  }
  .btn-settings.active { border-color: var(--accent); color: var(--accent); }

  /* Settings panel */
  #settings-panel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.22s ease, padding 0.22s ease, border-width 0.22s ease;
    padding: 0 12px;
    border-width: 0;
  }
  #settings-panel.open { max-height: 200px; padding: 12px; border-width: 1.5px; }
  .settings-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .settings-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
    min-width: 80px;
  }
  #zoom-slider {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
    height: 4px;
  }
  .settings-value {
    font-size: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    min-width: 32px;
    text-align: right;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }

  /* Preview */
  #preview-wrap { overflow: hidden; min-height: 120px; }
  #preview { padding: 8px 10px; overflow-x: auto; overflow-y: hidden; }
  #preview svg { display: block; }
  #preview svg path, #preview svg rect, #preview svg ellipse,
  #preview svg polygon, #preview svg line, #preview svg polyline {
    fill: var(--text); stroke: var(--text);
  }
  #preview svg [fill="none"] { fill: none; }
  #preview svg [stroke="none"] { stroke: none; }
  #preview svg .mark path,
  #preview svg .mark rect,
  #preview svg .mark ellipse,
  #preview svg .mark polygon,
  #preview svg .mark line {
    fill: var(--accent) !important;
    stroke: var(--accent) !important;
  }

  /* Editor */
  .editor-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  #notation {
    width: 100%;
    min-height: 90px;
    max-height: 160px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    line-height: 1.6;
    padding: 10px 12px;
    resize: vertical;
    caret-color: var(--accent);
  }
  #notation::placeholder { color: var(--text-dim); }

  .editor-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    gap: 6px;
  }
  .footer-left { display: flex; gap: 6px; }
  .footer-right { display: flex; gap: 6px; }

  .action-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s;
    letter-spacing: 0.04em;
    touch-action: manipulation;
  }
  .btn-copy { background: var(--accent); color: #111; }
  .btn-clear { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-templates { background: transparent; color: var(--accent2); border: 1px solid #2a5a4a; }
  .btn-templates.active { background: #0a2a1f; border-color: var(--accent2); }

  /* Template panel */
  #tmpl-panel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.22s ease, padding 0.22s ease, border-width 0.22s ease;
    padding: 0 8px;
    border-width: 0;
  }
  #tmpl-panel.open { max-height: 300px; padding: 8px; border-width: 1.5px; }
  .tmpl-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .tmpl-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(0.65rem, 2.4vw, 0.8rem);
    font-weight: 600;
    background: var(--btn-bg);
    color: var(--accent2);
    border: 1.5px solid #2a5a4a;
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s;
    white-space: nowrap;
    touch-action: manipulation;
  }

  .copy-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--accent2);
    color: #0a2a1f;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 8px 20px;
    border-radius: 20px;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .copy-toast.show { transform: translateX(-50%) translateY(0); }

  /* Key rows */
  .key-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    width: 100%;
  }
  .key {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    border: 1.5px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    transition: background 0.08s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    flex: 1 1 0;
    min-width: 0;
    padding: 0;
    white-space: nowrap;
    overflow: hidden;
    touch-action: manipulation;
  }
  @keyframes keyflash {
    0%   { background: #556; transform: scale(0.88); }
    40%  { background: #445; }
    100% { background: var(--btn-bg); transform: scale(1); }
  }
  @keyframes keyflash-primary {
    0%   { background: #4a4520; transform: scale(0.88); }
    40%  { background: #3a3518; }
    100% { background: var(--btn-bg-lg); transform: scale(1); }
  }
  @keyframes keyflash-bksp {
    0%   { background: #3a1515; transform: scale(0.88); }
    100% { background: #1e1010; transform: scale(1); }
  }
  @keyframes btnflash {
    0%   { opacity: 0.6; transform: scale(0.94); }
    100% { opacity: 1;   transform: scale(1); }
  }
  @keyframes tmplflash {
    0%   { background: #0d3d2a; transform: scale(0.92); }
    100% { background: var(--btn-bg); transform: scale(1); }
  }
  .key.flash               { animation: keyflash 0.25s cubic-bezier(0.2, 0, 0.4, 1); }
  .row-primary .key.flash  { animation: keyflash-primary 0.25s cubic-bezier(0.2, 0, 0.4, 1); }
  .key-bksp.flash          { animation: keyflash-bksp 0.25s cubic-bezier(0.2, 0, 0.4, 1) !important; }
  .tmpl-btn.flash          { animation: tmplflash 0.25s cubic-bezier(0.2, 0, 0.4, 1); }
  .action-btn.flash        { animation: btnflash 0.2s cubic-bezier(0.2, 0, 0.4, 1); }

  .row-primary .key {
    height: 48px;
    font-size: clamp(0.85rem, 3.2vw, 1.2rem);
    border-color: var(--btn-border-lg);
    background: var(--btn-bg-lg);
    color: var(--accent);
  }
  .key-bksp {
    flex: 1.4 1 0 !important;
    background: #1e1010 !important;
    border-color: #4a2020 !important;
    color: #e06060 !important;
    font-size: clamp(0.85rem, 3vw, 1rem) !important;
  }
  .row-notes .key { height: 42px; font-size: clamp(0.8rem, 2.8vw, 1rem); }
  .key-z { color: var(--accent2) !important; }
  .key-space {
    flex: 4 1 0 !important;
    font-size: clamp(0.55rem, 2vw, 0.7rem) !important;
    letter-spacing: 0.06em;
    color: var(--text-dim) !important;
  }
  .key-nl {
    flex: 1.5 1 0 !important;
    font-size: clamp(0.6rem, 2.2vw, 0.75rem) !important;
    color: var(--text-dim) !important;
  }
  .row-small .key { height: 36px; font-size: clamp(0.7rem, 2.6vw, 0.9rem); color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">ABC <span>Notepad</span></div>
  <button class="btn-settings action-btn" id="settingsToggle" data-action="toggleSettings">Settings</button>
</header>

<div id="settings-panel">
  <div class="settings-row">
    <span class="settings-label">Preview zoom</span>
    <input type="range" id="zoom-slider" min="0" max="1" step="0.01" value="0.5">
    <span class="settings-value" id="zoom-value">50%</span>
  </div>
</div>

<div id="preview-wrap">
  <div id="preview"></div>
</div>

<div class="editor-wrap">
  <textarea id="notation" placeholder="Type or tap to enter ABC notation…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  <div class="editor-footer">
    <div class="footer-left">
      <button class="action-btn btn-templates" id="tmplToggle" data-action="toggleTemplates">Templates</button>
    </div>
    <div class="footer-right">
      <button class="action-btn btn-clear" id="clearBtn" data-action="clearStep1">Clear</button>
      <span id="clearConfirm" style="display:none; align-items:center; gap:5px;">
        <button class="action-btn btn-clear" style="color:#e06060;" data-action="clearStep2">Clear</button>
        <button class="action-btn btn-clear" data-action="clearCancel">Cancel</button>
      </span>
      <button class="action-btn btn-copy" data-action="copyText">Copy</button>
    </div>
  </div>
</div>

<div id="tmpl-panel">
  <div class="tmpl-grid">
    <button class="tmpl-btn" data-insert="%%score ">%%score</button>
    <button class="tmpl-btn" data-insert="%%score {1 | 2}">%%score {1|2}</button>
    <button class="tmpl-btn" data-insert="%%score {(1 2) | (3 4)}">%%score {(1 2)|(3 4)}</button>
    <button class="tmpl-btn" data-insert="T:">T:</button>
    <button class="tmpl-btn" data-insert="V:">V:</button>
    <button class="tmpl-btn" data-insert="L:">L:</button>
    <button class="tmpl-btn" data-insert="W:">W:</button>
    <button class="tmpl-btn" data-insert="clef=treble ">clef=treble</button>
    <button class="tmpl-btn" data-insert="clef=bass ">clef=bass</button>
    <button class="tmpl-btn" data-insert="style=">style=</button>
    <button class="tmpl-btn" data-insert="[V:1]">[V:1]</button>
    <button class="tmpl-btn" data-insert="[V:2]">[V:2]</button>
    <button class="tmpl-btn" data-insert="(3">(3</button>
    <button class="tmpl-btn" data-insert="!mark!">!mark!</button>
    <button class="tmpl-btn" data-insert="%%score {RH | LH}&#10;V:RH clef=treble&#10;V:LH clef=bass&#10;[V:RH]&#10;[V:LH]">Grand Staff</button>
    <button class="tmpl-btn" data-insert="%%staffsep 25&#10;K:perc stafflines=0&#10;L:3/2&#10;z z | z z | z z | z z |">Chord Chart</button>
  </div>
</div>

<!-- Row 1: _ ^ = [ ] ( ) " . ⌫ -->
<div class="key-row row-primary">
  <button class="key" data-insert="_">_</button>
  <button class="key" data-insert="^">^</button>
  <button class="key" data-insert="=">=</button>
  <button class="key" data-insert="[">&#91;</button>
  <button class="key" data-insert="]">&#93;</button>
  <button class="key" data-insert="(">&#40;</button>
  <button class="key" data-insert=")">&#41;</button>
  <button class="key" data-insert="&quot;">&quot;</button>
  <button class="key" data-insert=".">.</button>
  <button class="key key-bksp" data-action="bksp">⌫</button>
</div>

<!-- Row 2: c d e f g a b ' z -->
<div class="key-row row-notes">
  <button class="key" data-insert="c">c</button>
  <button class="key" data-insert="d">d</button>
  <button class="key" data-insert="e">e</button>
  <button class="key" data-insert="f">f</button>
  <button class="key" data-insert="g">g</button>
  <button class="key" data-insert="a">a</button>
  <button class="key" data-insert="b">b</button>
  <button class="key" data-insert="'">'</button>
  <button class="key key-z" data-insert="z">z</button>
</div>

<!-- Row 3: C D E F G A B , / -->
<div class="key-row row-notes">
  <button class="key" data-insert="C">C</button>
  <button class="key" data-insert="D">D</button>
  <button class="key" data-insert="E">E</button>
  <button class="key" data-insert="F">F</button>
  <button class="key" data-insert="G">G</button>
  <button class="key" data-insert="A">A</button>
  <button class="key" data-insert="B">B</button>
  <button class="key" data-insert=","><span style="font-size:1.4em;line-height:1">,</span></button>
  <button class="key" data-insert="/">/</button>
</div>

<!-- Row 4: 0-9 -->
<div class="key-row row-small">
  <button class="key" data-insert="0">0</button>
  <button class="key" data-insert="1">1</button>
  <button class="key" data-insert="2">2</button>
  <button class="key" data-insert="3">3</button>
  <button class="key" data-insert="4">4</button>
  <button class="key" data-insert="5">5</button>
  <button class="key" data-insert="6">6</button>
  <button class="key" data-insert="7">7</button>
  <button class="key" data-insert="8">8</button>
  <button class="key" data-insert="9">9</button>
</div>

<!-- Row 5: - SPACE | ↵ -->
<div class="key-row row-notes">
  <button class="key" data-insert="-">-</button>
  <button class="key key-space" data-insert=" ">SPACE</button>
  <button class="key" data-insert="|">|</button>
  <button class="key key-nl" data-insert="&#10;">↵</button>
</div>

<div class="copy-toast" id="toast">Copied ✓</div>

<script>
  const ta = document.getElementById('notation');
  const toast = document.getElementById('toast');
  const previewDiv = document.getElementById('preview');

  let taFocused = false;
  let savedStart = 0, savedEnd = 0;
  let debounceTimer = null;

  ta.addEventListener('focus', () => { taFocused = true; });
  ta.addEventListener('blur', () => {
    taFocused = false;
    savedStart = ta.selectionStart;
    savedEnd = ta.selectionEnd;
  });
  ta.addEventListener('keyup', () => {
    if (taFocused) { savedStart = ta.selectionStart; savedEnd = ta.selectionEnd; }
  });
  ta.addEventListener('click', () => {
    if (taFocused) { savedStart = ta.selectionStart; savedEnd = ta.selectionEnd; }
  });
  document.addEventListener('selectionchange', () => {
    if (taFocused) { savedStart = ta.selectionStart; savedEnd = ta.selectionEnd; }
  });
  ta.addEventListener('input', schedulePreview);

  const zoomSlider = document.getElementById('zoom-slider');
  const zoomValueEl = document.getElementById('zoom-value');
  let zoomLevel = 0.5; // 0 = zoomed in (large music), 1 = zoomed out (small music)

  const BASE_MULTIPLIER = 1.45;
  const SCALING_FACTOR = 1.4;

  function getStaffwidth() {
    const containerWidth = previewDiv.offsetWidth || 320;
    const multiplier = BASE_MULTIPLIER - (zoomLevel - 0.5) * SCALING_FACTOR;
    return Math.round(containerWidth * multiplier);
  }

  zoomSlider.addEventListener('input', () => {
    zoomLevel = parseFloat(zoomSlider.value);
    zoomValueEl.textContent = Math.round(zoomLevel * 100) + '%';
    renderPreview();
  });

  function schedulePreview() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderPreview, 900);
  }

  function renderPreview() {
    const raw = ta.value.trim();
    if (!raw) { previewDiv.innerHTML = ''; return; }
    try {
      ABCJS.renderAbc('preview', raw, {
        responsive: 'resize',
        staffwidth: getStaffwidth(),
        add_classes: true,
        paddingtop: 6, paddingbottom: 6, paddingleft: 8, paddingright: 8,
        jazzchords: false,
        format: { gchordfont: 'Helvetica 12' }
      });
    } catch(e) {}
  }

  // Core insert — used by both key buttons and template buttons
  function doInsert(text, refocus) {
    const s = savedStart;
    const e = savedEnd;
    ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
    savedStart = s + text.length;
    savedEnd = savedStart;
    if (refocus) {
      ta.focus();
      ta.setSelectionRange(savedStart, savedEnd);
    }
    ta.scrollTop = ta.scrollHeight;
    schedulePreview();
  }

  function bksp() {
    const wasActive = taFocused;
    if (savedStart === savedEnd && savedStart > 0) {
      ta.value = ta.value.slice(0, savedStart - 1) + ta.value.slice(savedEnd);
      savedStart -= 1; savedEnd = savedStart;
    } else if (savedStart !== savedEnd) {
      ta.value = ta.value.slice(0, savedStart) + ta.value.slice(savedEnd);
      savedEnd = savedStart;
    }
    if (wasActive) { ta.focus(); ta.setSelectionRange(savedStart, savedEnd); }
    ta.scrollTop = ta.scrollHeight;
    schedulePreview();
  }

  function toggleTemplates() {
    const panel = document.getElementById('tmpl-panel');
    const btn = document.getElementById('tmplToggle');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
  }

  function copyText() {
    if (!ta.value) return;
    navigator.clipboard.writeText(ta.value).then(showToast).catch(() => {
      try { document.execCommand('copy'); showToast(); } catch(e) {}
    });
  }

  function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function clearStep1() {
    if (!ta.value) return;
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('clearConfirm').style.display = 'flex';
  }

  function clearStep2() {
    ta.value = ''; savedStart = 0; savedEnd = 0;
    previewDiv.innerHTML = '';
    previewDiv.removeAttribute('style');
    clearTimeout(debounceTimer);
    clearCancel();
  }

  function clearCancel() {
    document.getElementById('clearBtn').style.display = '';
    document.getElementById('clearConfirm').style.display = 'none';
  }

  function toggleSettings() {
    const panel = document.getElementById('settings-panel');
    const btn = document.getElementById('settingsToggle');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
  }

  // Unified button interaction — works for both touch and mouse
  const actions = { toggleTemplates, toggleSettings, copyText, clearStep1, clearStep2, clearCancel, bksp };

  function handleButtonPress(btn) {
    // Restart flash animation
    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');
    // copyText deferred to release so iOS treats it as a valid clipboard gesture
    if (btn.dataset.action === 'copyText') return;
    // Fire all other actions immediately on press
    if (btn.dataset.action) {
      const fn = actions[btn.dataset.action];
      if (fn) fn();
    } else if (btn.dataset.insert !== undefined) {
      const isKey = btn.classList.contains('key');
      doInsert(btn.dataset.insert, isKey && taFocused);
    }
  }

  function handleButtonRelease(btn) {
    if (btn.dataset.action === 'copyText') copyText();
  }

  // Touch handling — press on touchstart, fire on touchend
  let activeBtn = null;
  document.addEventListener('touchstart', e => {
    const btn = e.target.closest('.key, .tmpl-btn, .action-btn');
    if (!btn) return;
    // Prevent textarea blur for key/tmpl buttons
    if (btn.classList.contains('key') || btn.classList.contains('tmpl-btn')) {
      e.preventDefault();
    }
    activeBtn = btn;
    handleButtonPress(btn);
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!activeBtn) return;
    handleButtonRelease(activeBtn);
    activeBtn = null;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchcancel', e => {
    if (activeBtn) { activeBtn.classList.remove('pressed'); activeBtn = null; }
  }, { passive: true });

  // Mouse handling for desktop — single document-level listener so mouseup always fires
  let activeMouseBtn = null;

  document.addEventListener('mousedown', e => {
    const btn = e.target.closest('.key, .tmpl-btn, .action-btn');
    if (!btn) return;
    if (btn.classList.contains('key') || btn.classList.contains('tmpl-btn')) {
      e.preventDefault(); // prevent textarea blur for keyboard/template buttons
    }
    activeMouseBtn = btn;
    handleButtonPress(btn);
  });

  document.addEventListener('mouseup', () => {
    if (!activeMouseBtn) return;
    handleButtonRelease(activeMouseBtn);
    activeMouseBtn = null;
  });
  
</script>
</body>
</html>
