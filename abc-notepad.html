<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABC Notepad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #e8c84a;
    --accent2: #4ae8b4;
    --text: #f0ede6;
    --text-dim: #888;
    --btn-bg: #222;
    --btn-bg-lg: #2a2a1a;
    --btn-border: #3a3a3a;
    --btn-border-lg: #5a5020;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 7px;
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    padding: 2px 0 2px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }

  /* Preview */
  #preview-wrap {
    overflow: hidden;
    min-height: 40px;
  }

  #preview {
    padding: 8px 10px;
    overflow-x: auto;
    overflow-y: hidden;
  }

  /* Force abcjs SVG to be white/light on dark bg */
  #preview svg {
    display: block;
  }
  #preview svg path,
  #preview svg rect,
  #preview svg ellipse,
  #preview svg polygon,
  #preview svg line,
  #preview svg polyline {
    fill: var(--text);
    stroke: var(--text);
  }
  /* Don't recolour transparent fills */
  #preview svg [fill="none"] { fill: none; }
  #preview svg [stroke="none"] { stroke: none; }

  /* Editor */
  .editor-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  #notation {
    width: 100%;
    min-height: 90px;
    max-height: 160px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    line-height: 1.6;
    padding: 10px 12px;
    resize: vertical;
    caret-color: var(--accent);
  }
  #notation::placeholder { color: var(--text-dim); }

  .editor-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 5px 8px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    gap: 6px;
  }

  .action-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.04em;
  }
  .btn-copy { background: var(--accent); color: #111; }
  .btn-copy:active { background: #c9a830; transform: scale(0.96); }
  .btn-clear { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-clear:active { background: var(--surface2); transform: scale(0.96); }

  .copy-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--accent2);
    color: #0a2a1f;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 8px 20px;
    border-radius: 20px;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .copy-toast.show { transform: translateX(-50%) translateY(0); }

  /* Single non-wrapping row */
  .key-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 4px;
    width: 100%;
  }

  .key {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    border: 1.5px solid var(--btn-border);
    background: var(--btn-bg);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    transition: background 0.08s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    flex: 1 1 0;
    min-width: 0;
    padding: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  .key:active { background: #333; transform: scale(0.93); }

  .row-primary .key {
    height: 48px;
    font-size: clamp(0.85rem, 3.2vw, 1.2rem);
    border-color: var(--btn-border-lg);
    background: var(--btn-bg-lg);
    color: var(--accent);
  }
  .key-bksp {
    flex: 1.4 1 0 !important;
    background: #1e1010 !important;
    border-color: #4a2020 !important;
    color: #e06060 !important;
    font-size: clamp(0.85rem, 3vw, 1rem) !important;
  }

  .row-notes .key {
    height: 42px;
    font-size: clamp(0.8rem, 2.8vw, 1rem);
  }
  .key-z { color: var(--accent2) !important; }
  .key-space {
    flex: 2 1 0 !important;
    font-size: clamp(0.55rem, 2vw, 0.7rem) !important;
    letter-spacing: 0.06em;
    color: var(--text-dim) !important;
  }
  .key-nl {
    flex: 1.5 1 0 !important;
    font-size: clamp(0.6rem, 2.2vw, 0.75rem) !important;
    color: var(--text-dim) !important;
  }

  .row-small .key {
    height: 36px;
    font-size: clamp(0.7rem, 2.6vw, 0.9rem);
    color: var(--text-dim);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">ABC <span>Notepad</span></div>
</header>

<!-- Preview -->
<div id="preview-wrap">
  <div id="preview"></div>
</div>

<!-- Editor -->
<div class="editor-wrap">
  <textarea id="notation" placeholder="Type or tap to enter ABC notation…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  <div class="editor-footer">
    <button class="action-btn btn-clear" onclick="clearAll()">Clear</button>
    <button class="action-btn btn-copy" onclick="copyText()">Copy</button>
  </div>
</div>

<!-- Row 1: Primary symbols + backspace -->
<div class="key-row row-primary">
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('[')">&#91;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins(']')">&#93;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('_')">_</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('^')">^</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins(',')"><span style="font-size:1.4em;line-height:1">,</span></button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins(&quot;'&quot;)">'</button>
  <button class="key" onmousedown="event.preventDefault()" onclick='ins(&apos;"&apos;)'>&quot;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('|')">|</button>
  <button class="key key-bksp" onmousedown="event.preventDefault()" onclick="bksp()">⌫</button>
</div>

<!-- Row 2: Upper notes + space -->
<div class="key-row row-notes">
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('C')">C</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('D')">D</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('E')">E</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('F')">F</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('G')">G</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('A')">A</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('B')">B</button>
  <button class="key key-z" onmousedown="event.preventDefault()" onclick="ins('z')">z</button>
  <button class="key key-space" onmousedown="event.preventDefault()" onclick="ins(' ')">SPACE</button>
</div>

<!-- Row 3: Lower notes + = + newline -->
<div class="key-row row-notes">
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('c')">c</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('d')">d</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('e')">e</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('f')">f</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('g')">g</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('a')">a</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('b')">b</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('=')">=</button>
  <button class="key key-nl" onmousedown="event.preventDefault()" onclick="ins('\n')">↵ NL</button>
</div>

<div class="divider"></div>

<!-- Row 4: Numbers -->
<div class="key-row row-small">
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('0')">0</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('1')">1</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('2')">2</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('3')">3</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('4')">4</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('5')">5</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('6')">6</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('7')">7</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('8')">8</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('9')">9</button>
</div>

<!-- Row 5: Misc symbols -->
<div class="key-row row-small">
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('(')">&#40;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins(')')">&#41;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('{')">&#123;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('}')">&#125;</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins(':')">:</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('-')">-</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('%')">%</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('/')">/</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('!')">!</button>
  <button class="key" onmousedown="event.preventDefault()" onclick="ins('.')">.</button>
</div>

<div class="copy-toast" id="toast">Copied ✓</div>

<script>
  const ta = document.getElementById('notation');
  const toast = document.getElementById('toast');
  const previewDiv = document.getElementById('preview');

  let taFocused = false;
  let savedStart = 0, savedEnd = 0;
  let debounceTimer = null;

  ta.addEventListener('focus', () => { taFocused = true; });
  ta.addEventListener('blur', () => {
    taFocused = false;
    savedStart = ta.selectionStart;
    savedEnd = ta.selectionEnd;
  });
  ta.addEventListener('keyup', () => {
    if (taFocused) { savedStart = ta.selectionStart; savedEnd = ta.selectionEnd; }
  });
  ta.addEventListener('click', () => {
    if (taFocused) { savedStart = ta.selectionStart; savedEnd = ta.selectionEnd; }
  });

  // Also trigger preview on manual typing
  ta.addEventListener('input', schedulePreview);

  function schedulePreview() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderPreview, 900);
  }

  function renderPreview() {
    const raw = ta.value.trim();
    if (!raw) {
      previewDiv.innerHTML = '';
      return;
    }
    try {
      ABCJS.renderAbc('preview', raw, {
        responsive: 'resize',
        staffwidth: previewDiv.offsetWidth - 20 || 320,
        paddingtop: 6,
        paddingbottom: 6,
        paddingleft: 8,
        paddingright: 8,
        jazzchords: false,
        format: { gchordfont: 'Helvetica 12' }
      });
    } catch(e) {
      // Silently ignore parse errors mid-typing
    }
  }

  function ins(char) {
    const wasActive = taFocused;
    const s = savedStart;
    const e = savedEnd;
    ta.value = ta.value.slice(0, s) + char + ta.value.slice(e);
    savedStart = s + char.length;
    savedEnd = savedStart;
    if (wasActive) {
      ta.focus();
      ta.setSelectionRange(savedStart, savedEnd);
    }
    schedulePreview();
  }

  function bksp() {
    const wasActive = taFocused;
    if (savedStart === savedEnd && savedStart > 0) {
      ta.value = ta.value.slice(0, savedStart - 1) + ta.value.slice(savedEnd);
      savedStart -= 1;
      savedEnd = savedStart;
    } else if (savedStart !== savedEnd) {
      ta.value = ta.value.slice(0, savedStart) + ta.value.slice(savedEnd);
      savedEnd = savedStart;
    }
    if (wasActive) {
      ta.focus();
      ta.setSelectionRange(savedStart, savedEnd);
    }
    schedulePreview();
  }

  function copyText() {
    if (!ta.value) return;
    navigator.clipboard.writeText(ta.value).then(showToast).catch(() => {
      ta.select();
      document.execCommand('copy');
      showToast();
    });
  }

  function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function clearAll() {
    if (ta.value && confirm('Clear all text?')) {
      ta.value = '';
      savedStart = 0; savedEnd = 0;
      previewDiv.innerHTML = '';
      clearTimeout(debounceTimer);
    }
  }
</script>
</body>
</html>
